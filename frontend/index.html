<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlogSpace — API Dashboard</title>
  <meta name="description" content="A sleek frontend for the BlogSpace REST API — manage users, articles, follows and more." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">✦Blog Space</div>

      <nav class="nav">
        <a class="nav-link" href="#home" id="nav-home">
          <span class="nav-icon">🏠</span> <span>Home</span>
        </a>
        <a class="nav-link" href="#feed" id="nav-feed">
          <span class="nav-icon">✨</span> <span>My Feed</span>
        </a>

        <p class="nav-section">Auth</p>
        <a class="nav-link" href="#register" id="nav-register">
          <span class="nav-icon">📝</span> <span>Register</span>
        </a>
        <a class="nav-link" href="#login" id="nav-login">
          <span class="nav-icon">🔐</span> <span>Login</span>
        </a>

        <p class="nav-section">Articles</p>
        <a class="nav-link" href="#articles" id="nav-articles">
          <span class="nav-icon">📰</span> <span>All Articles</span>
        </a>
        <a class="nav-link" href="#new-article" id="nav-new-article">
          <span class="nav-icon">✍️</span> <span>Write Article</span>
        </a>
        <a class="nav-link" href="#single-article" id="nav-single-article">
          <span class="nav-icon">🔍</span> <span>Find Article</span>
        </a>
        <a class="nav-link" href="#explore" id="nav-explore">
          <span class="nav-icon">🧭</span> <span>Explore</span>
        </a>
        <a class="nav-link" href="#bookmarks" id="nav-bookmarks">
          <span class="nav-icon">🔖</span> <span>Bookmarks</span>
        </a>

        <p class="nav-section">Social</p>
        <a class="nav-link" href="#dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span> <span>My Dashboard</span>
        </a>
        <a class="nav-link" href="#settings" id="nav-settings">
          <span class="nav-icon">⚙️</span> <span>Settings</span>
        </a>
        <a class="nav-link" href="#author" id="nav-author">
          <span class="nav-icon">👤</span> <span>Author Profile</span>
        </a>

        <!-- Theme Toggle -->
        <div class="theme-toggle-container">
          <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
            <span class="icon-light">☀️</span>
            <span class="icon-dark">🌙</span>
            <span class="theme-text">Theme</span>
          </button>
        </div>
      </nav>
    </aside>

    <!-- ── Main View ── -->
    <main class="main">
      <div id="view"></div>
    </main>

  </div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <!-- SPA entry point (module so ES imports work) -->
  <script type="module" src="./app.js"></script>

</body>
</html>
